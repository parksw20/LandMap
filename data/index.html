<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>부동산 실거래가 시각화</title>
  <link rel="stylesheet" href="./styles.css?v=18">
  <!-- Kakao Maps SDK -->
  <script type="text/javascript"
    src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=61feaec3994e05d0c9235d6b07bc5712&libraries=services,clusterer"></script>
</head>

<body>

  <!-- Full Screen Map -->
  <div id="map"></div>

  <!-- Map Controls (Top Right) -->
  <div id="map-controls" class="map-controls">
    <button id="skyview-btn" class="control-btn">스카이뷰</button>
    <button id="roadview-btn" class="control-btn" title="도로를 클릭하면 로드뷰가 열립니다">로드뷰</button>
    <button id="cadastral-btn" class="control-btn" title="지적편집도 표시">지적도</button>
    <div class="map-btn-wrap">
      <button id="redev-btn" class="control-btn" title="재개발·재건축 구역 표시">정비사업</button>
      <div class="map-dropdown" id="redev-dropdown"></div>
    </div>
    <div class="map-btn-wrap">
      <button id="bldgage-btn" class="control-btn" title="건물 폴리곤 + 매물 마커를 경과년수 색으로 (VWorld)">건물연령</button>
      <div class="map-dropdown" id="bldgage-dropdown"></div>
    </div>
    <div class="map-btn-wrap">
      <button id="landuse-btn" class="control-btn" title="용도지역(토지이용계획) 오버레이 — VWorld">이용계획</button>
      <div class="map-dropdown">
        <div class="dropdown-title">용도지역 (토지이용계획)</div>
        <div class="legend-v-item"><span class="legend-dot" style="background:#f2e14c"></span>주거지역</div>
        <div class="legend-v-item"><span class="legend-dot" style="background:#f2a6c0"></span>상업지역</div>
        <div class="legend-v-item"><span class="legend-dot" style="background:#a89ae0"></span>공업지역</div>
        <div class="legend-v-item"><span class="legend-dot" style="background:#9fd08d"></span>녹지지역</div>
        <div class="dropdown-note" style="margin:6px 0 0;">국토부 VWorld 용도지역 도면 (색상은 대표 예시)</div>
      </div>
    </div>
  </div>

  <!-- 줌 컨트롤 아래 아이콘 도구 (현위치/거리/면적/반경) -->
  <div id="side-tools" class="side-tools">
    <button id="geoloc-btn" class="tool-btn" title="현재 위치로 이동">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="7"/><circle cx="12" cy="12" r="2.5" fill="currentColor" stroke="none"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
    </button>
    <button id="dist-btn" class="tool-btn" title="거리 측정 (클릭으로 선 그리기, 더블클릭/ESC 종료)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 20L20 4"/><path d="M7 17l1.5 1.5M10.5 13.5L12 15M14 10l1.5 1.5M17.5 6.5L19 8"/></svg>
    </button>
    <button id="area-btn" class="tool-btn" title="면적 측정 (클릭으로 꼭짓점 지정, 자동 계산)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3l8 6-3 11H7L4 9z"/></svg>
    </button>
    <button id="radius-btn" class="tool-btn" title="화면 중앙 기준 100m 간격 동심원">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4.5"/><circle cx="12" cy="12" r="1" fill="currentColor" stroke="none"/></svg>
    </button>
    <button id="route-btn" class="tool-btn" title="길찾기: 출발지 → 도착지 클릭 (카카오맵 경로 열기)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="19" r="2.5"/><circle cx="18" cy="5" r="2.5"/><path d="M8 17.5C11 15 9 12 12 10s7-2 7.5-2.7" stroke-dasharray="3 2"/></svg>
    </button>
  </div>

  <!-- 로드뷰 패널 (조그 패드 포함 — 로드뷰 시점 조작) -->
  <div id="roadview-panel" class="roadview-panel" style="display:none;">
    <div id="roadview" class="roadview-view"></div>
    <button id="rv-close-btn" class="rv-close">&times;</button>
    <div id="jog-pad" class="jog-pad">
      <button class="jog-arrow" data-dx="0" data-dy="-1" style="top:4px;left:50%;transform:translateX(-50%);">▲</button>
      <button class="jog-arrow" data-dx="1" data-dy="-1" style="top:16px;right:14px;">◥</button>
      <button class="jog-arrow" data-dx="1" data-dy="0" style="top:50%;right:4px;transform:translateY(-50%);">▶</button>
      <button class="jog-arrow" data-dx="1" data-dy="1" style="bottom:16px;right:14px;">◢</button>
      <button class="jog-arrow" data-dx="0" data-dy="1" style="bottom:4px;left:50%;transform:translateX(-50%);">▼</button>
      <button class="jog-arrow" data-dx="-1" data-dy="1" style="bottom:16px;left:14px;">◣</button>
      <button class="jog-arrow" data-dx="-1" data-dy="0" style="top:50%;left:4px;transform:translateY(-50%);">◀</button>
      <button class="jog-arrow" data-dx="-1" data-dy="-1" style="top:16px;left:14px;">◤</button>
      <div class="jog-center" id="jog-knob" title="드래그로 시점 조작"></div>
    </div>
  </div>

  <!-- 필지 정보 패널 (하단 고정 — 지도 위 필지 영역을 가리지 않음) -->
  <div id="parcel-panel" class="parcel-panel" style="display:none;"></div>

  <!-- 모바일: 필터 열기/닫기 토글 (좌측 상단, 패널 밖 독립 버튼) -->
  <button id="filter-fab" class="filter-fab">☰ 필터</button>

  <!-- Floating Control Panel -->
  <div id="control-panel" class="control-panel">
    <!-- Toggle Button (Inside Panel, Outside Wrapper) -->
    <button id="panel-toggle-btn" class="toggle-btn" title="패널 토글">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 6L6 18M6 6l12 12"></path>
      </svg>
    </button>

    <!-- Content Wrapper -->
    <div class="panel-content-wrapper">

      <!-- Fixed Top Section (Header + Filters) -->
      <div class="panel-fixed-top">
        <div class="panel-header">
          <h1>부동산 실거래 분석</h1>
          <p class="subtitle">데이터를 선택하여 지도에서 확인하세요</p>

          <!-- Search Box -->
          <div class="search-container">
            <input type="text" id="search-input" placeholder="아파트, 건물명 검색" autocomplete="off">
            <ul id="search-results" class="search-results hidden"></ul>
          </div>
        </div>

        <!-- Filters -->
        <div class="panel-section">
            <div class="section-title">데이터 선택 (기간)</div>
            <div class="period-select-container">
                <select id="base-month-select" class="modern-select">
                    <option value="">데이터 로딩 중...</option>
                </select>
                <select id="range-select" class="modern-select">
                    <option value="1">현재 월</option>
                    <option value="2">2개월 포함</option>
                    <option value="3">3개월 포함</option>
                    <option value="6">6개월 포함</option>
                    <option value="12">1년 포함</option>
                    <option value="24">2년 포함</option>
                    <option value="36">3년 포함</option>
                </select>
            </div>
        </div>


        <div class="panel-section">
          <div class="section-title">부동산 유형</div>
          <div class="checkbox-group">
            <label class="filter-chip">
              <input type="radio" name="housingType" value="apt" checked>
              <span class="chip-label">아파트</span>
            </label>
            <label class="filter-chip">
              <input type="radio" name="housingType" value="rh">
              <span class="chip-label">연립/다세대</span>
            </label>
            <label class="filter-chip">
              <input type="radio" name="housingType" value="sh">
              <span class="chip-label">단독/다가구</span>
            </label>
            <label class="filter-chip">
              <input type="radio" name="housingType" value="off">
              <span class="chip-label">오피스텔</span>
            </label>
            <label class="filter-chip">
              <input type="radio" name="housingType" value="nrg">
              <span class="chip-label">상가</span>
            </label>
            <label class="filter-chip">
              <input type="radio" name="housingType" value="land">
              <span class="chip-label">토지</span>
            </label>
            <label class="filter-chip">
              <input type="radio" name="housingType" value="silv">
              <span class="chip-label">분양권</span>
            </label>
            <label class="filter-chip">
              <input type="radio" name="housingType" value="indu">
              <span class="chip-label">공장/창고</span>
            </label>
          </div>
        </div>

        <div class="panel-section">
          <div class="section-title">거래 유형</div>
          <div class="checkbox-group">
            <label class="filter-chip">
              <input type="checkbox" name="transactionType" value="매매" checked>
              <span class="chip-label">매매</span>
            </label>
            <label class="filter-chip">
              <input type="checkbox" name="transactionType" value="전세" checked>
              <span class="chip-label">전세</span>
            </label>
            <label class="filter-chip">
              <input type="checkbox" name="transactionType" value="월세" checked>
              <span class="chip-label">월세</span>
            </label>
          </div>
          <div id="tx-availability-note" class="tx-note" style="display:none;">
            ※ 선택한 유형은 <b>매매 실거래만</b> 제공됩니다 (전·월세 데이터 없음)
          </div>
        </div>

        <div class="panel-section">
          <div class="section-header-flex">
            <div class="section-title area-title"><span>면적 선택</span><span class="area-basis-note">공급면적 기준</span><span id="area-range-text" class="range-value-text">전체</span></div>
            <div class="unit-toggle-container">
              <button id="unit-pyeong" class="unit-btn active">평</button>
              <button id="unit-m2" class="unit-btn">㎡</button>
            </div>
          </div>
          <div class="range-slider-container">
            <div class="slider-track"></div>
            <!-- 값이 아닌 '위치'(0~500)를 다룬다 — 구간별 비선형 스케일(app.js posToPyeong) -->
            <input type="range" id="area-min" min="0" max="500" value="0" step="1">
            <input type="range" id="area-max" min="0" max="500" value="500" step="1">
          </div>
          <div class="range-labels">
            <span>0평</span>
            <span>20평</span>
            <span>40평</span>
            <span>60평</span>
            <span>100평</span>
            <span>200평+</span>
          </div>
        </div>
      </div>

      <!-- Scrollable Data List Section -->
      <div id="data-section" class="panel-scroll-area" style="display:none;">
        <div class="data-section-header" style="padding: 20px 24px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border-color); position:sticky; top:0; background:white; z-index:10;">
          <div style="min-width:0;">
            <h2 id="data-title" style="font-size:18px; font-weight:800;">거래 내역</h2>
            <div id="data-address" class="data-address"></div>
            <div id="data-meta" class="data-meta"></div>
          </div>
          <div style="display:flex; gap:6px; flex-shrink:0;">
            <button id="expand-data-btn" title="전체화면 전환" style="border:none; background:#f3f4f6; width:32px; height:32px; border-radius:50%; cursor:pointer; font-size:15px;">⛶</button>
            <button id="close-data-btn" style="border:none; background:#f3f4f6; width:32px; height:32px; border-radius:50%; cursor:pointer; font-size:18px;">&times;</button>
          </div>
        </div>

        <div class="local-filter-section" style="padding: 15px 24px; background:#f9fafb; border-bottom:1px solid var(--border-color);">
            <div class="section-title" style="font-size:11px; margin-bottom:8px;">리스트 내 거래 유형 필터</div>
            <div class="checkbox-group">
                <label class="filter-chip sm">
                  <input type="checkbox" name="localTransactionType" value="매매" checked>
                  <span class="chip-label" style="padding:4px 12px; font-size:12px;">매매</span>
                </label>
                <label class="filter-chip sm">
                  <input type="checkbox" name="localTransactionType" value="전세" checked>
                  <span class="chip-label" style="padding:4px 12px; font-size:12px;">전세</span>
                </label>
                <label class="filter-chip sm">
                  <input type="checkbox" name="localTransactionType" value="월세" checked>
                  <span class="chip-label" style="padding:4px 12px; font-size:12px;">월세</span>
                </label>
            </div>
        </div>

        <div id="area-filter" class="area-filter-container"></div>
        <div id="data-list" class="data-list">
          <!-- Data Cards will be injected here -->
        </div>
      </div>

      <div class="panel-footer">
        <div id="status-bar">준비 완료</div>
      </div>
    </div>
  </div>

  <script src="./config.local.js?v=18"></script>
  <script src="./config.pages.js?v=18"></script>
  <script src="./app.js?v=18"></script>
</body>

</html>
